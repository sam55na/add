        .stat-card .icon {
            width: 50px;

            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;

        .stat-card .icon.primary { background: rgba(108, 92, 231, 0.2); color: var(--primary-color); }

        .stat-card .icon.warning { background: rgba(253, 203, 110, 0.2); color: var(--warning-color); }
        .stat-card .icon.danger { background: rgba(225, 112, 85, 0.2); color: var(--danger-color); }
        .stat-card .icon.info { background: rgba(9, 132, 227, 0.2); color: var(--info-color); }

            font-weight: 700;

            border-radius: 15px;

        }

        .badge-status.completed { background: var(--success-color); color: white; }
        .badge-status.rejected { background: var(--danger-color); color: white; }
        .badge-status.active { background: var(--success-color); color: white; }
        .badge-status.inactive { background: #636e72; color: white; }
        
        .search-box {
            background: var(--bg-card);
            border: 1px solid #2d3436;
            border-radius: 10px;
            padding: 10px 15px;
            color: var(--text-light);
            width: 100%;
        }
        
        .search-box:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }
        
        .btn-primary-custom {

            padding: 10px 20px;

            color: white;
            transition: all 0.3s;

<script>
// ============================================================
// التكوين الأساسي
// ============================================================

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4VhY7JXujKnGx0Ddr6unXUqq7qMjVINz1GOKF-Xin0TlRUl1gSf6avq-EtytbJ9Aa/exec'; // ضع رابط الـ Web App هنا
const ADMIN_ID = '7011476249'; // ضع معرف المشرف هنا

let currentPage = 'dashboard';
let chartInstance = null;
let modalInstance = null;

// ============================================================
// دوال الاتصال بالـ API
// ============================================================

async function apiCall(action, params = {}) {
    params.action = action;
    params.userId = ADMIN_ID;
    
    const url = new URL(SCRIPT_URL);
    Object.keys(params).forEach(key => {
        url.searchParams.append(key, params[key]);
    });
    
    try {
        const response = await fetch(url.toString());
        const data = await response.json();
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        return data;
    } catch (error) {
        console.error('API Error:', error);
        showAlert('error', 'حدث خطأ في الاتصال: ' + error.message);
        throw error;
    }
}

// ============================================================
// دوال العرض
// ============================================================

function showAlert(type, message) {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type === 'error' ? 'danger' : 'success'} alert-dismissible fade show`;
    alertDiv.role = 'alert';
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    
    const container = document.querySelector('.main-content');
    container.insertBefore(alertDiv, container.firstChild);
    
    setTimeout(() => {
        if (alertDiv.parentNode) {
            alertDiv.remove();
        }
    }, 5000);
}

function showLoading(containerId = 'contentArea') {
    document.getElementById(containerId).innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
        </div>
    `;
}

function formatCurrency(amount) {
    if (!amount) return '0';
    return Number(amount).toLocaleString('ar-EG');
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
        const date = new Date(dateStr);
        return date.toLocaleString('ar-EG');
    } catch {
        return dateStr;
    }
}

function getStatusBadge(status) {
    const statusMap = {
        'pending': '<span class="badge-status pending">⏳ قيد المعالجة</span>',
        'completed': '<span class="badge-status completed">✅ مكتمل</span>',
        'rejected': '<span class="badge-status rejected">❌ مرفوض</span>',
        'refunded': '<span class="badge-status rejected">🔄 مسترجع</span>',
        'active': '<span class="badge-status active">✅ مفعل</span>',
        'inactive': '<span class="badge-status inactive">❌ معطل</span>'
    };
    return statusMap[status] || `<span class="badge-status pending">${status}</span>`;
}

// ============================================================
// تحميل الصفحات
// ============================================================

async function loadPage(page) {
    currentPage = page;
    
    // تحديث الـ Sidebar
    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        link.classList.remove('active');
    });
    document.querySelector(`.sidebar .nav-link[data-page="${page}"]`)?.classList.add('active');
    
    // تحديث العنوان
    const titles = {
        'dashboard': '📊 لوحة التحكم',
        'users': '👥 المستخدمين',
        'transactions': '💰 المعاملات',
        'withdrawals': '📤 طلبات السحب',
        'payments': '📥 طلبات الدفع',
        'gift_codes': '🎁 أكواد الهدية',
        'referrals': '🔗 الإحالات',
        'settings': '⚙️ الإعدادات',
        'blocked': '🚫 الأرقام المحظورة',
        'report': '📋 التقارير'
    };
    document.getElementById('pageTitle').innerHTML = `<i class="fas fa-${page === 'dashboard' ? 'chart-pie' : 'circle'}"></i> ${titles[page] || page}`;
    
    // تحميل المحتوى
    showLoading();
    
    try {
        switch (page) {
            case 'dashboard':
                await loadDashboard();
                break;
            case 'users':
                await loadUsers();
                break;
            case 'transactions':
                await loadTransactions();
                break;
            case 'withdrawals':
                await loadWithdrawals();
                break;
            case 'payments':
                await loadPaymentRequests();
                break;
            case 'gift_codes':
                await loadGiftCodes();
                break;
            case 'referrals':
                await loadReferrals();
                break;
            case 'settings':
                await loadSettings();
                break;
            case 'blocked':
                await loadBlocked();
                break;
            case 'report':
                await loadReport();
                break;
        }
    } catch (error) {
        document.getElementById('contentArea').innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل الصفحة: ${error.message}
            </div>
        `;
    }
}

function refreshCurrentPage() {
    loadPage(currentPage);
}

// ============================================================
// 2. المستخدمين
// ============================================================

async function loadUsers() {
    const data = await apiCall('users', { limit: 50 });
    const users = data.users || [];
    
    let html = `
        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6><i class="fas fa-users"></i> قائمة المستخدمين</h6>
                <div>
                    <input class="search-box" placeholder="🔍 بحث عن مستخدم..." 
                           onkeyup="searchUsers(this.value)">
                </div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المعرف</th>
                            <th>اسم المستخدم</th>
                            <th>الرصيد</th>
                            <th>IChancy</th>
                            <th>الحالة</th>
                            <th>تاريخ التسجيل</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
    `;
    
    if (users.length === 0) {
        html += `<tr><td colspan="8" class="text-center text-muted">لا يوجد مستخدمين</td></tr>`;
    } else {
        users.forEach((user, index) => {
            const isBanned = user.is_banned == 1;
            const hasIchancy = user.has_ichancy_account == 1;
            
            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td><code>${user.user_id}</code></td>
                    <td>${user.username || '-'}</td>
                    <td><strong>${formatCurrency(user.wallet_balance)}</strong></td>
                    <td>${hasIchancy ? '✅' : '❌'}</td>
                    <td>${isBanned ? '🚫 محظور' : '✅ نشط'}</td>
                    <td>${formatDate(user.created_at)}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="viewUser('${user.user_id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm ${isBanned ? 'btn-success' : 'btn-danger'}" 
                                onclick="toggleUserBan('${user.user_id}')">

async function editUserBalance(userId) {
    const newBalance = prompt('أدخل المبلغ الجديد للرصيد (استخدم + للإضافة أو - للخصم):');
    if (newBalance === null) return;
    
    const amount = parseFloat(newBalance);
    if (isNaN(amount)) {
        showAlert('error', 'الرجاء إدخال رقم صحيح');
        return;
    }
    
    try {
        const data = await apiCall('update_balance', { targetUser: userId, amount });
        if (data.success) {
            showAlert('success', `تم تحديث الرصيد: ${formatCurrency(data.new_balance)} SYP`);
            loadPage('users');
        }
    } catch (error) {
        showAlert('error', error.message);
    }
}

function searchUsers(query) {
    // Simple client-side search
    const rows = document.querySelectorAll('.table tbody tr');
    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
    });
}

function showCreateGiftCode() {
    const modal = new bootstrap.Modal(document.getElementById('editModal'));
    document.getElementById('editModalTitle').innerHTML = '🎁 إنشاء كود هدية جديد';
    document.getElementById('editModalBody').innerHTML = `
        <form id="createGiftForm">
            <div class="mb-3">
                <label class="form-label">💰 القيمة (SYP)</label>
                <input type="number" class="form-control" id="giftAmount" required min="1">
            </div>
            <div class="mb-3">
                <label class="form-label">📊 عدد الاستخدامات المسموحة</label>
                <input type="number" class="form-control" id="giftMaxUses" value="1" min="1">
            </div>
            <div class="mb-3">
                <label class="form-label">⏰ مدة الصلاحية (أيام، 0 = بدون صلاحية)</label>
                <input type="number" class="form-control" id="giftExpiry" value="0" min="0">
            </div>
        </form>
    `;
    
    document.getElementById('editModalSave').onclick = async function() {
        const amount = parseFloat(document.getElementById('giftAmount').value);
        const maxUses = parseInt(document.getElementById('giftMaxUses').value) || 1;
        const expiresIn = parseInt(document.getElementById('giftExpiry').value) || 0;
        
        if (!amount || amount <= 0) {
            showAlert('error', 'الرجاء إدخال قيمة صحيحة');
            return;
        }
        
        try {
            const data = await apiCall('create_gift_code', { 
                amount, 
                maxUses, 
                expiresIn: expiresIn > 0 ? expiresIn : null 
            });
            
            if (data.success) {
                showAlert('success', `✅ تم إنشاء الكود: ${data.code}`);
                modal.hide();
                loadPage('gift_codes');
            }
        } catch (error) {
            showAlert('error', error.message);
        }
    };
    
    modal.show();
}

                </td>
            </tr>
        `;
    });
    
    html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById('contentArea').innerHTML = html;
}

function editSetting(key, label) {
    const modal = new bootstrap.Modal(document.getElementById('editModal'));
    document.getElementById('editModalTitle').innerHTML = `⚙️ تعديل: ${label}`;
    document.getElementById('editModalBody').innerHTML = `
        <form>
            <div class="mb-3">
                <label class="form-label">القيمة الجديدة</label>
                <input type="text" class="form-control" id="settingValue" placeholder="أدخل القيمة الجديدة">
            </div>
        </form>
    `;
    
    document.getElementById('editModalSave').onclick = async function() {
        const value = document.getElementById('settingValue').value.trim();
        if (!value) {
            showAlert('error', 'الرجاء إدخال قيمة');
            return;
        }
        
        try {
            const data = await apiCall('update_setting', { key, value });
            if (data.success) {
                showAlert('success', 'تم تحديث الإعداد بنجاح');
                modal.hide();
                loadPage('settings');
            }
        } catch (error) {
            showAlert('error', error.message);
        }
    };
    
    modal.show();
}

async function togglePaymentMethod(methodId) {
    try {
        const data = await apiCall('toggle_payment_method', { methodId });
        if (data.success) {
            showAlert('success', `تم ${data.enabled == 1 ? 'تفعيل' : 'تعطيل'} طريقة الدفع`);
            loadPage('settings');
        }
    } catch (error) {
        showAlert('error', error.message);

}

async function toggleWithdrawMethod(methodId) {

    }
}

async function loadBlocked() {
    const data = await apiCall('blocked');
    const blocked = data.blocked_txids || [];
    
    let html = `
        <div class="table-container">
            <h6><i class="fas fa-ban text-danger"></i> الأرقام المحظورة</h6>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>رقم العملية</th>
                            <th>السبب</th>
                            <th>التاريخ</th>
                            <th>المستخدم 1</th>
                            <th>المستخدم 2</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody>
    `;
    
    if (blocked.length === 0) {
        html += `<tr><td colspan="6" class="text-center text-muted">لا توجد أرقام محظورة</td></tr>`;
    } else {
        blocked.forEach(item => {
            html += `
                <tr>
                    <td><code>${item.txid}</code></td>
                    <td>${item.reason || '-'}</td>
                    <td>${item.date || '-'}</td>
                    <td>${item.user1_id || '-'}</td>
                    <td>${item.user2_id || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-success" onclick="unblockTxid('${item.txid}')">
                            <i class="fas fa-unlock"></i> فك الحظر
                        </button>
                    </td>
                </tr>
            `;
        });
    }
    
    html += `
                    </tbody>
                </table>
            </div>
        </div>
    `;
    
    document.getElementById('contentArea').innerHTML = html;
}

async function unblockTxid(txid) {
    if (!confirm(`هل أنت متأكد من فك حظر ${txid}؟`)) return;
    
    try {
        const data = await apiCall('unblock_txid', { txid });
        if (data.success) {
            showAlert('success', 'تم فك الحظر بنجاح');
            loadPage('blocked');
        }
    } catch (error) {
        showAlert('error', error.message);
    }
}

    const users = data.recent_users || [];
    
    let html = `
        <div class="row g-4">

                        </div>
                        <div class="col-md-4">
                            <p><strong>⏳ طلبات سحب معلقة:</strong> ${stats.pending_withdrawals}</p>
                            <p><strong>💰 إجمالي العمولات:</strong> ${formatCurrency(stats.total_commission)} SYP</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">

                    <h6><i class="fas fa-exchange-alt text-info"></i> آخر المعاملات</h6>
                    <div class="table-responsive">

                    </div>
