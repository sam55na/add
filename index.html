<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICHANCY Admin Panel</title>
    
    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ============================================================
           المتغيرات العامة
           ============================================================ */
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --primary-light: #a29bfe;
            --secondary: #2d3436;
            --success: #00b894;
            --danger: #e17055;
            --warning: #fdcb6e;
            --info: #0984e3;
            --bg-dark: #0f0f1a;
            --bg-card: #181830;
            --bg-card-hover: #222244;
            --bg-input: #1e1e3a;
            --text-light: #e8e8f0;
            --text-muted: #8888aa;
            --border-color: #2a2a4a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================================
           الأساسيات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           الشريط الجانبي
           ============================================================ */
        .sidebar {
            background: var(--bg-card);
            min-height: 100vh;
            padding: 0;
            border-left: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .sidebar .nav {
            padding: 15px 10px;
            flex: 1;
        }

        .sidebar .nav-link {
            color: var(--text-muted);
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            margin: 3px 0;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .sidebar .nav-link:hover {
            background: rgba(108, 92, 231, 0.15);
            color: var(--text-light);
            border-color: rgba(108, 92, 231, 0.2);
            transform: translateX(-4px);
        }

        .sidebar .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
            border-color: var(--primary);
        }

        .sidebar .nav-link i {
            width: 22px;
            text-align: center;
            font-size: 16px;
        }

        .sidebar .nav-link .badge-count {
            margin-right: auto;
            background: var(--danger);
            color: white;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ============================================================
           المحتوى الرئيسي
           ============================================================ */
        .main-content {
            padding: 25px 35px;
            min-height: 100vh;
        }

        /* ============================================================
           الهيدر
           ============================================================ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title i {
            color: var(--primary);
        }

        .page-title small {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-refresh {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: rotate(180deg);
        }

        .btn-refresh .fa-spin {
            animation: spin 1s linear infinite;
        }

        /* ============================================================
           البطاقات الإحصائية
           ============================================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            opacity: 0;
            transition: var(--transition);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
            background: var(--bg-card-hover);
        }

        .stat-card .stat-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card .stat-info {
            flex: 1;
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-card .stat-number {
            font-size: 30px;
            font-weight: 900;
            margin: 4px 0;
            letter-spacing: -0.5px;
        }

        .stat-card .stat-number.primary { color: var(--primary); }
        .stat-card .stat-number.success { color: var(--success); }
        .stat-card .stat-number.danger { color: var(--danger); }
        .stat-card .stat-number.warning { color: var(--warning); }
        .stat-card .stat-number.info { color: var(--info); }

        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .stat-card .stat-icon.primary { background: rgba(108, 92, 231, 0.2); color: var(--primary); }
        .stat-card .stat-icon.success { background: rgba(0, 184, 148, 0.2); color: var(--success); }
        .stat-card .stat-icon.danger { background: rgba(225, 112, 85, 0.2); color: var(--danger); }
        .stat-card .stat-icon.warning { background: rgba(253, 203, 110, 0.2); color: var(--warning); }
        .stat-card .stat-icon.info { background: rgba(9, 132, 227, 0.2); color: var(--info); }

        .stat-card .stat-change {
            font-size: 12px;
            margin-top: 6px;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
        }

        .stat-card .stat-change.up { background: rgba(0, 184, 148, 0.15); color: var(--success); }
        .stat-card .stat-change.down { background: rgba(225, 112, 85, 0.15); color: var(--danger); }

        /* ============================================================
           الجداول
           ============================================================ */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 0;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
        }

        .table-header h6 {
            font-weight: 700;
            font-size: 16px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-header h6 i {
            color: var(--primary);
        }

        .table-tools {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .table-tools .search-box {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            color: var(--text-light);
            width: 220px;
            font-size: 13px;
            transition: var(--transition);
        }

        .table-tools .search-box:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .table-tools .search-box::placeholder {
            color: var(--text-muted);
        }

        .table-responsive {
            padding: 0;
        }

        .table {
            margin: 0;
            font-size: 13px;
        }

        .table thead th {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 2px solid var(--border-color);
            color: var(--primary-light);
            font-weight: 700;
            padding: 14px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table tbody td {
            padding: 12px 16px;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-light);
        }

        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .table .text-muted-custom {
            color: var(--text-muted);
        }

        /* ============================================================
           الأزرار
           ============================================================ */
        .btn-group-custom {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-sm-custom {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            border: none;
            transition: var(--transition);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-sm-custom:hover {
            transform: scale(1.05);
        }

        .btn-sm-custom.btn-view { background: rgba(9, 132, 227, 0.2); color: var(--info); }
        .btn-sm-custom.btn-view:hover { background: var(--info); color: white; }

        .btn-sm-custom.btn-ban { background: rgba(225, 112, 85, 0.2); color: var(--danger); }
        .btn-sm-custom.btn-ban:hover { background: var(--danger); color: white; }

        .btn-sm-custom.btn-unban { background: rgba(0, 184, 148, 0.2); color: var(--success); }
        .btn-sm-custom.btn-unban:hover { background: var(--success); color: white; }

        .btn-sm-custom.btn-edit { background: rgba(253, 203, 110, 0.2); color: var(--warning); }
        .btn-sm-custom.btn-edit:hover { background: var(--warning); color: #2d3436; }

        .btn-sm-custom.btn-approve { background: rgba(0, 184, 148, 0.2); color: var(--success); }
        .btn-sm-custom.btn-approve:hover { background: var(--success); color: white; }

        .btn-sm-custom.btn-reject { background: rgba(225, 112, 85, 0.2); color: var(--danger); }
        .btn-sm-custom.btn-reject:hover { background: var(--danger); color: white; }

        .btn-sm-custom.btn-toggle { background: rgba(108, 92, 231, 0.2); color: var(--primary); }
        .btn-sm-custom.btn-toggle:hover { background: var(--primary); color: white; }

        .btn-sm-custom.btn-delete { background: rgba(225, 112, 85, 0.15); color: var(--danger); }
        .btn-sm-custom.btn-delete:hover { background: var(--danger); color: white; }

        /* ============================================================
           الحالات
           ============================================================ */
        .badge-status {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-status.pending { background: rgba(253, 203, 110, 0.2); color: var(--warning); }
        .badge-status.completed { background: rgba(0, 184, 148, 0.2); color: var(--success); }
        .badge-status.rejected { background: rgba(225, 112, 85, 0.2); color: var(--danger); }
        .badge-status.refunded { background: rgba(225, 112, 85, 0.15); color: #e17055; }
        .badge-status.active { background: rgba(0, 184, 148, 0.2); color: var(--success); }
        .badge-status.inactive { background: rgba(99, 110, 114, 0.2); color: #636e72; }

        /* ============================================================
           المودال
           ============================================================ */
        .modal-content {
            background: var(--bg-card);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 18px 24px;
        }

        .modal-header .btn-close {
            filter: invert(1);
            opacity: 0.6;
        }

        .modal-header .btn-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-light);
        }

        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-control:focus {
            background: var(--bg-input);
            border-color: var(--primary);
            color: var(--text-light);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        /* ============================================================
           الإشعارات
           ============================================================ */
        .alert {
            border-radius: var(--radius-sm);
            border: none;
            padding: 14px 20px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(0, 184, 148, 0.15);
            color: var(--success);
            border-right: 4px solid var(--success);
        }

        .alert-danger {
            background: rgba(225, 112, 85, 0.15);
            color: var(--danger);
            border-right: 4px solid var(--danger);
        }

        .alert-info {
            background: rgba(9, 132, 227, 0.15);
            color: var(--info);
            border-right: 4px solid var(--info);
        }

        .alert-warning {
            background: rgba(253, 203, 110, 0.15);
            color: var(--warning);
            border-right: 4px solid var(--warning);
        }

        .alert .btn-close {
            filter: invert(1);
            opacity: 0.5;
        }

        /* ============================================================
           زر إنشاء كود هدية
           ============================================================ */
        .btn-create {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
            color: white;
        }

        /* ============================================================
           التحميل
           ============================================================ */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            gap: 20px;
        }

        .loading-container .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-container p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* ============================================================
           التجاوب مع الشاشات الصغيرة
           ============================================================ */
        @media (max-width: 992px) {
            .sidebar {
                min-height: auto;
                height: auto;
                position: relative;
                border-left: none;
                border-bottom: 1px solid var(--border-color);
            }

            .sidebar .nav {
                display: flex;
                flex-wrap: wrap;
                padding: 10px;
                gap: 4px;
            }

            .sidebar .nav-link {
                padding: 8px 14px;
                font-size: 13px;
                margin: 0;
                flex: 1 1 auto;
                min-width: 80px;
                justify-content: center;
            }

            .sidebar .nav-link i {
                margin-left: 0;
                margin-right: 0;
            }

            .sidebar .nav-link .nav-text {
                display: none;
            }

            .sidebar-header .logo {
                font-size: 22px;
            }

            .main-content {
                padding: 15px 18px;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
            }

            .stat-card .stat-number {
                font-size: 22px;
            }

            .page-title {
                font-size: 20px;
            }

            .table-tools .search-box {
                width: 150px;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .table-tools {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 576px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .stat-card {
                padding: 14px 16px;
            }

            .stat-card .stat-number {
                font-size: 18px;
            }

            .stat-card .stat-label {
                font-size: 11px;
            }

            .stat-card .stat-icon {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }

            .page-title {
                font-size: 17px;
            }

            .main-content {
                padding: 10px 12px;
            }

            .table tbody td {
                padding: 8px 10px;
                font-size: 12px;
            }

            .table thead th {
                padding: 10px 10px;
                font-size: 10px;
            }

            .btn-sm-custom {
                padding: 4px 8px;
                font-size: 10px;
            }

            .table-tools .search-box {
                width: 100%;
            }

            .btn-create {
                padding: 8px 16px;
                font-size: 12px;
                width: 100%;
                justify-content: center;
            }
        }

        /* ============================================================
           Scrollbar مخصص
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* ============================================================
           الفارغ
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .empty-state h5 {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ============================================================
           تقرير المستخدم
           ============================================================ */
        .user-report {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .user-report .divider {
            border-color: var(--border-color);
            margin: 18px 0;
        }

        .user-report .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .user-report .info-row:last-child {
            border-bottom: none;
        }

        .user-report .info-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .user-report .info-value {
            font-weight: 600;
        }

        /* ============================================================
           الروابط
           ============================================================ */
        a {
            text-decoration: none;
        }

        .text-code {
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- ============================================================
        الشريط الجانبي
        ============================================================ -->
        <div class="col-md-3 col-lg-2 sidebar">
            <div class="sidebar-header">
                <div class="logo">⚡ ICHANCY</div>
                <div class="subtitle">لوحة الإدارة المتقدمة</div>
            </div>

            <nav class="nav flex-column">
                <a class="nav-link active" onclick="loadPage('dashboard')" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a class="nav-link" onclick="loadPage('users')" data-page="users">
                    <i class="fas fa-users"></i>
                    <span class="nav-text">المستخدمين</span>
                </a>
                <a class="nav-link" onclick="loadPage('transactions')" data-page="transactions">
                    <i class="fas fa-exchange-alt"></i>
                    <span class="nav-text">المعاملات</span>
                </a>
                <a class="nav-link" onclick="loadPage('withdrawals')" data-page="withdrawals">
                    <i class="fas fa-hand-holding-usd"></i>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">

<script>
    // ============================================================
    // التكوين الأساسي
    // ============================================================

    // ⚠️ قم بتغيير هذا الرابط إلى رابط التطبيق الخاص بك
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6rWMfQvPSZ0cYtbnn-NGPYE88TBVqQshU3xpv9dnSVjQ4YgL2Flq4O2H3QUGrpQ_G/exec';

    // ⚠️ قم بتغيير هذا المعرف إلى معرف المشرف الخاص بك
    const ADMIN_ID = '7011476249';

    let currentPage = 'dashboard';
    let autoRefreshInterval = null;
    let modalInstance = null;

    // ============================================================
    // دوال الاتصال بـ API
    // ============================================================

    async function apiCall(action, params = {}) {
        params.action = action;
        params.userId = ADMIN_ID;

        const url = new URL(SCRIPT_URL);
        Object.keys(params).forEach(key => {
            if (params[key] !== null && params[key] !== undefined) {
                url.searchParams.append(key, params[key]);
            }
        });

        try {
            const response = await fetch(url.toString(), {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            return data;
        } catch (error) {
            console.error('API Error:', error);
            showAlert('danger', '⚠️ حدث خطأ في الاتصال: ' + error.message);
            throw error;
        }
    }

    // ============================================================
    // دوال العرض الأساسية
    // ============================================================

    function showAlert(type, message) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
        alertDiv.role = 'alert';
        alertDiv.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="إغلاق"></button>
        `;

        const container = document.querySelector('.main-content');
        container.insertBefore(alertDiv, container.firstChild);

        setTimeout(() => {
            if (alertDiv.parentNode) {
                alertDiv.remove();
            }
        }, 6000);
    }

    function showLoading(containerId = 'contentArea') {
        document.getElementById(containerId).innerHTML = `
            <div class="loading-container">
                <div class="spinner"></div>
                <p>جاري تحميل البيانات...</p>
            </div>
        `;
    }

    function formatCurrency(amount) {
        if (!amount && amount !== 0) return '0';
        return Number(amount).toLocaleString('ar-EG');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
            const date = new Date(dateStr);
            return date.toLocaleString('ar-EG', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch {
            return dateStr;
        }
    }

    function getStatusBadge(status) {
        const map = {
            'pending': '<span class="badge-status pending">⏳ قيد المعالجة</span>',
            'completed': '<span class="badge-status completed">✅ مكتمل</span>',
            'rejected': '<span class="badge-status rejected">❌ مرفوض</span>',
            'refunded': '<span class="badge-status refunded">🔄 مسترجع</span>',
            'active': '<span class="badge-status active">✅ مفعل</span>',
            'inactive': '<span class="badge-status inactive">❌ معطل</span>'
        };
        return map[status] || `<span class="badge-status pending">${status}</span>`;
    }

    function truncate(str, len = 12) {
        if (!str) return '-';
        return str.length > len ? str.substring(0, len) + '...' : str;
    }

    // ============================================================
    // تحميل الصفحات
    // ============================================================

    async function loadPage(page) {

        if (activeLink) activeLink.classList.add('active');

        // تحديث العنوان
        const titles = {
            'dashboard': { icon: 'fa-chart-pie', label: 'لوحة التحكم', sub: 'نظرة عامة' },
            'users': { icon: 'fa-users', label: 'المستخدمين', sub: 'إدارة المستخدمين' },

            'report': { icon: 'fa-file-alt', label: 'التقارير', sub: 'تقارير شاملة' }
        };

        const info = titles[page] || titles.dashboard;
        document.getElementById('pageTitle').innerHTML = `
            <i class="fas ${info.icon}"></i>
            ${info.label}
            <small>${info.sub}</small>
        `;

        // بدء/إيقاف التحديث التلقائي
        if (page === 'dashboard') {
            startAutoRefresh();
        } else {
            stopAutoRefresh();
        }

        // تحميل المحتوى
        showLoading();

        try {
            switch (page) {
                case 'dashboard':
                    await loadDashboard();
                    break;
                case 'users':
                    await loadUsers();
                    break;
                case 'transactions':
                    await loadTransactions();
                    break;
                case 'withdrawals':

                    break;
                case 'payments':
                    await loadPaymentRequests();
                    break;
                case 'gift_codes':

                    break;
                case 'referrals':

                    break;
                case 'settings':
                    await loadSettings();
                    break;
                case 'blocked':
                    await loadBlocked();
                    break;
                case 'report':
                    await loadReport();
                    break;
            }
        } catch (error) {
            document.getElementById('contentArea').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle"></i>
                    حدث خطأ في تحميل الصفحة: ${error.message}
                    <br>
                    <button class="btn btn-sm btn-outline-light mt-2" onclick="refreshCurrentPage()">
                        <i class="fas fa-redo"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
    }

    function refreshCurrentPage() {
        loadPage(currentPage);
    }

    // التحديث التلقائي
    // ============================================================

    function startAutoRefresh() {
        stopAutoRefresh();
        autoRefreshInterval = setInterval(() => {
            if (currentPage === 'dashboard') {
                loadDashboard();
            }
        }, 30000);
    }

    function stopAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    }

    function searchTable(query, tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
        });
    }

    async function editUserBalance(userId) {
        const amount = prompt('💰 أدخل المبلغ (استخدم + للإضافة أو - للخصم):\nمثال: 1000 أو -500');

    function showCreateGiftCode() {
        const modal = new bootstrap.Modal(document.getElementById('editModal'));
        document.getElementById('editModalTitle').innerHTML = '🎁 إنشاء كود هدية جديد';
        document.getElementById('editModalBody').innerHTML = `
            <form id="createGiftForm">
                <div class="mb-3">
                    <label class="form-label">💰 القيمة (SYP)</label>
                    <input type="number" class="form-control" id="giftAmount" required min="1" placeholder="مثال: 5000">
                </div>
                <div class="mb-3">
                    <label class="form-label">📊 عدد الاستخدامات المسموحة</label>
                    <input type="number" class="form-control" id="giftMaxUses" value="1" min="1">
                </div>
                <div class="mb-3">
                    <label class="form-label">⏰ مدة الصلاحية (أيام، 0 = بدون صلاحية)</label>
                    <input type="number" class="form-control" id="giftExpiry" value="0" min="0">
                </div>
            </form>
        `;

        document.getElementById('editModalSave').onclick = async function() {
            const amount = parseFloat(document.getElementById('giftAmount').value);
            const maxUses = parseInt(document.getElementById('giftMaxUses').value) || 1;
            const expiresIn = parseInt(document.getElementById('giftExpiry').value) || 0;

            if (!amount || amount <= 0) {
                showAlert('danger', '⚠️ الرجاء إدخال قيمة صحيحة');
                return;
            }

            try {
                const data = await apiCall('create_gift_code', {
                    amount,
                    maxUses,
                    expiresIn: expiresIn > 0 ? expiresIn : null
                });

                if (data.success) {
                    showAlert('success', `✅ تم إنشاء الكود: <code>${data.code}</code>`);
                    modal.hide();
                    loadPage('gift_codes');
                }
            } catch (error) {
                showAlert('danger', error.message);
            }
        };

        modal.show();
    }

                        <h6><i class="fas fa-cog text-primary"></i> إعدادات النظام</h6>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>الإعداد</th>
                                        <th>القيمة</th>
                                        <th>الإجراء</th>
                                    </tr>
                                </thead>
                                <tbody>
        `;

        const settingsList = [
            { key: 'referral_commission', label: 'عمولة الإحالة %' },
            { key: 'min_deposit', label: 'الحد الأدنى للشحن' },
            { key: 'min_withdraw', label: 'الحد الأدنى للسحب' },
            { key: 'weekly_percentage', label: 'نسبة الجائزة الأسبوعية %' },
            { key: 'monthly_percentage', label: 'نسبة الجائزة الشهرية %' },
            { key: 'welcome_bonus_enabled', label: 'البونص الترحيبي' },
            { key: 'welcome_bonus_percent', label: 'نسبة البونص الترحيبي %' },
            { key: 'welcome_bonus_max_amount', label: 'الحد الأقصى للبونص' }
        ];

        settingsList.forEach(item => {
            const value = settings[item.key] || '0';
            html += `
                <tr>
                    <td>${item.label}</td>
                    <td><strong>${value}</strong></td>
                    <td>
                        <button class="btn-sm-custom btn-edit" onclick="editSetting('${item.key}', '${item.label}')">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                </tr>
            `;
        });

        html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="stat-card">
                        <h6><i class="fas fa-credit-card text-success"></i> طرق الدفع اليدوية</h6>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>الطريقة</th>
                                        <th>الحالة</th>
                                        <th>الإجراء</th>
                                    </tr>
                                </thead>
                                <tbody>
        `;

        if (manualMethods.length === 0) {
            html += `
                <tr>
                    <td colspan="3" class="text-center text-muted">لا توجد طرق دفع</td>
                </tr>
            `;
        } else {
            manualMethods.forEach(method => {
                const isEnabled = method.enabled == 1;
                html += `
                    <tr>
                        <td>${method.name}</td>
                        <td>${getStatusBadge(isEnabled ? 'active' : 'inactive')}</td>
                        <td>
                            <button class="btn-sm-custom ${isEnabled ? 'btn-toggle' : 'btn-approve'}" 
                                    onclick="togglePaymentMethod(${method.id})">
                                <i class="fas fa-${isEnabled ? 'pause' : 'play'}"></i>
                                ${isEnabled ? 'تعطيل' : 'تفعيل'}
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        html += `
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="stat-card mt-3">
                        <h6><i class="fas fa-hand-holding-usd text-warning"></i> طرق السحب</h6>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>الطريقة</th>
                                        <th>الحالة</th>
                                        <th>الإجراء</th>
                                    </tr>
                                </thead>
                                <tbody>
        `;

        if (withdrawMethods.length === 0) {
            html += `
                <tr>
                    <td colspan="3" class="text-center text-muted">لا توجد طرق سحب</td>
                </tr>
            `;
        } else {
            withdrawMethods.forEach(method => {
                const isEnabled = method.enabled == 1;
                html += `
                    <tr>
                        <td>${method.name}</td>
                        <td>${getStatusBadge(isEnabled ? 'active' : 'inactive')}</td>
                        <td>
                            <button class="btn-sm-custom ${isEnabled ? 'btn-toggle' : 'btn-approve'}" 
                                    onclick="toggleWithdrawMethod(${method.id})">
                                <i class="fas fa-${isEnabled ? 'pause' : 'play'}"></i>
                                ${isEnabled ? 'تعطيل' : 'تفعيل'}
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('contentArea').innerHTML = html;
    }

    // ============================================================
    // تعديل إعداد
    // ============================================================

    function editSetting(key, label) {
        const modal = new bootstrap.Modal(document.getElementById('editModal'));
        document.getElementById('editModalTitle').innerHTML = `⚙️ تعديل: ${label}`;
        document.getElementById('editModalBody').innerHTML = `
            <form>
                <div class="mb-3">
                    <label class="form-label">القيمة الجديدة</label>
                    <input type="text" class="form-control" id="settingValue" placeholder="أدخل القيمة الجديدة">
                </div>
            </form>
        `;

        document.getElementById('editModalSave').onclick = async function() {
            const value = document.getElementById('settingValue').value.trim();
            if (!value) {
                showAlert('danger', '⚠️ الرجاء إدخال قيمة');
                return;
            }

            try {
                const data = await apiCall('update_setting', { key, value });
                if (data.success) {
                    showAlert('success', '✅ تم تحديث الإعداد بنجاح');
                    modal.hide();
                    loadPage('settings');
                }
            } catch (error) {
                showAlert('danger', error.message);
            }
        };

        modal.show();
    }

    // ============================================================
    // تفعيل/تعطيل طرق الدفع والسحب
    // ============================================================

    async function togglePaymentMethod(methodId) {
        try {
            const data = await apiCall('toggle_payment_method', { methodId });
            if (data.success) {
                showAlert('success', `✅ تم ${data.enabled == 1 ? 'تفعيل' : 'تعطيل'} طريقة الدفع`);
                loadPage('settings');
            }
        } catch (error) {
            showAlert('danger', error.message);
        }
    }

    async function toggleWithdrawMethod(methodId) {
        try {
            const data = await apiCall('toggle_withdraw_method', { methodId });
            if (data.success) {
                showAlert('success', `✅ تم ${data.enabled == 1 ? 'تفعيل' : 'تعطيل'} طريقة السحب`);
                loadPage('settings');
            }
        } catch (error) {
            showAlert('danger', error.message);
        }
    }

    // ============================================================
    // 9. الأرقام المحظورة
    // ============================================================

    async function loadBlocked() {
        const data = await apiCall('blocked');
        const blocked = data.blocked_txids || [];

        let html = `
            <div class="table-container">
                <div class="table-header">
                    <h6><i class="fas fa-ban text-danger"></i> الأرقام المحظورة</h6>
                    <div class="table-tools">
                        <span style="color:var(--text-muted);font-size:13px;">${blocked.length} رقم محظور</span>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table" id="blockedTable">
                        <thead>
                            <tr>
                                <th>رقم العملية</th>
                                <th>السبب</th>
                                <th>التاريخ</th>
                                <th>المستخدم 1</th>
                                <th>المستخدم 2</th>
                                <th>الإجراء</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        if (blocked.length === 0) {
            html += `
                <tr>
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="fas fa-ban"></i>
                            <h5>لا توجد أرقام محظورة</h5>
                            <p>جميع الأرقام في النظام نظيفة</p>
                        </div>
                    </td>
                </tr>
            `;
        } else {
            blocked.forEach(item => {
                html += `
                    <tr>
                        <td><code style="color:var(--danger);">${item.txid}</code></td>
                        <td>${item.reason || '-'}</td>
                        <td>${item.date || '-'}</td>
                        <td><code>${truncate(item.user1_id, 8)}</code></td>
                        <td><code>${truncate(item.user2_id, 8)}</code></td>
                        <td>
                            <button class="btn-sm-custom btn-success" onclick="unblockTxid('${item.txid}')">
                                <i class="fas fa-unlock"></i> فك الحظر
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        document.getElementById('contentArea').innerHTML = html;
    }

    // ============================================================
    // فك حظر رقم
    // ============================================================

    async function unblockTxid(txid) {
        if (!confirm(`⚠️ هل أنت متأكد من فك حظر ${txid}؟`)) return;

        try {
            const data = await apiCall('unblock_txid', { txid });
            if (data.success) {
                showAlert('success', '✅ تم فك الحظر بنجاح');
                loadPage('blocked');
            }
        } catch (error) {
            showAlert('danger', error.message);
        }
    }

    // ============================================================
    // 10. التقارير
    // ============================================================

    async function loadReport() {
        const data = await apiCall('report');
        const stats = data.stats || {};
        const transactions = data.recent_transactions || [];
        const pending = data.pending_withdrawals || [];

        let html = `
            <div class="row g-4">
                <div class="col-md-12">
                    <div class="stat-card">
                        <h6><i class="fas fa-file-alt text-primary"></i> تقرير شامل</h6>
                        <p class="text-muted">تم إنشاء التقرير: ${formatDate(data.generated_at)}</p>
                        <hr>

                        <div class="row">
                            <div class="col-md-4">
                                <p><strong>👥 إجمالي المستخدمين:</strong> <span class="text-primary">${stats.total_users || 0}</span></p>
                                <p><strong>✅ المستخدمين النشطين:</strong> <span class="text-success">${stats.active_users || 0}</span></p>
                                <p><strong>🎮 حسابات IChancy:</strong> <span class="text-info">${stats.ichancy_users || 0}</span></p>
                            </div>
                            <div class="col-md-4">
                                <p><strong>💰 إجمالي الشحنات:</strong> <span class="text-success">${formatCurrency(stats.total_payments)} SYP</span></p>
                                <p><strong>📤 إجمالي السحوبات:</strong> <span class="text-danger">${formatCurrency(stats.total_withdrawals)} SYP</span></p>
                                <p><strong>👥 الإحالات:</strong> <span class="text-info">${stats.total_referrals || 0}</span></p>
                            </div>
                            <div class="col-md-4">
                                <p><strong>⏳ طلبات سحب معلقة:</strong> <span class="text-warning">${stats.pending_withdrawals || 0}</span></p>
                                <p><strong>💰 إجمالي العمولات:</strong> <span class="text-warning">${formatCurrency(stats.total_commission)} SYP</span></p>
                                <p><strong>📊 إجمالي المعاملات:</strong> <span class="text-primary">${(stats.total_payments || 0) + (stats.total_withdrawals || 0)}</span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="stat-card">
                        <h6><i class="fas fa-exchange-alt text-info"></i> آخر المعاملات (10)</h6>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>المستخدم</th>
                                        <th>النوع</th>
                                        <th>المبلغ</th>
                                        <th>التاريخ</th>
                                    </tr>
                                </thead>
                                <tbody>
        `;

        if (transactions.length === 0) {
            html += `
                <tr>
                    <td colspan="4" class="text-center text-muted">لا توجد معاملات</td>
                </tr>
            `;
        } else {
            transactions.slice(0, 10).forEach(tx => {
                html += `
                    <tr>
                        <td><code>${truncate(tx.user_id, 8)}</code></td>
                        <td>${tx.type}</td>
                        <td class="${tx.amount >= 0 ? 'text-success' : 'text-danger'}">
                            ${formatCurrency(tx.amount)}
                        </td>
                        <td>${formatDate(tx.created_at)}</td>
                    </tr>
                `;
            });
        }

        html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="stat-card">
                        <h6><i class="fas fa-clock text-warning"></i> طلبات سحب معلقة</h6>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>المستخدم</th>
                                        <th>المبلغ</th>
                                        <th>التاريخ</th>
                                    </tr>
                                </thead>
                                <tbody>
        `;

        if (pending.length === 0) {
            html += `
                <tr>
                    <td colspan="3" class="text-center text-muted">لا توجد طلبات معلقة</td>
                </tr>
            `;
        } else {
            pending.slice(0, 10).forEach(w => {
                html += `
                    <tr>
                        <td><code>${truncate(w.user_id, 8)}</code></td>
                        <td style="color:var(--warning);">${formatCurrency(w.amount)} SYP</td>
                        <td>${formatDate(w.created_at)}</td>
                    </tr>
                `;
            });
        }

        html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('contentArea').innerHTML = html;
    }

    // ============================================================
    // التهيئة
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
        loadPage('dashboard');
    });

    // ============================================================
    // تصدير الدوال للاستخدام العالمي
    // ============================================================

    // جعل جميع الدوال متاحة في النطاق العام
    window.loadPage = loadPage;
    window.refreshCurrentPage = refreshCurrentPage;
    window.viewUser = viewUser;
    window.toggleUserBan = toggleUserBan;
    window.editUserBalance = editUserBalance;
    window.approveWithdrawal = approveWithdrawal;
    window.rejectWithdrawal = rejectWithdrawal;
    window.approvePayment = approvePayment;
    window.rejectPayment = rejectPayment;
    window.showCreateGiftCode = showCreateGiftCode;
    window.toggleGiftCode = toggleGiftCode;
    window.deleteGiftCode = deleteGiftCode;
    window.editSetting = editSetting;
    window.togglePaymentMethod = togglePaymentMethod;
    window.toggleWithdrawMethod = toggleWithdrawMethod;
    window.unblockTxid = unblockTxid;
    window.searchTable = searchTable;
</script>
