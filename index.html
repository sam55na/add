<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ICHANCY - لوحة الإدارة المتقدمة</title>

    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>

    <style>
        /* ============================================================
           المتغيرات العامة
           ============================================================ */
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --primary-light: #6ea8fe;
            --primary-glow: rgba(13, 110, 253, 0.35);
            --danger: #dc3545;
            --danger-dark: #b02a37;
            --danger-light: #ea868f;
            --danger-glow: rgba(220, 53, 69, 0.35);
            --gradient-red: linear-gradient(135deg, #dc3545, #b02a37);
            --gradient-blue: linear-gradient(135deg, #0d6efd, #0a58ca);
            --gradient-main: linear-gradient(135deg, #0d6efd, #dc3545);
            --bg-dark: #0a0a1a;
            --bg-card: #111128;
            --bg-card-hover: #1a1a3e;
            --bg-input: #1a1a35;
            --text-light: #e8e8f0;
            --text-muted: #8888bb;
            --border-color: #2a2a55;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-blue: 0 8px 32px rgba(13, 110, 253, 0.25);
            --shadow-red: 0 8px 32px rgba(220, 53, 69, 0.25);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           الشريط الجانبي
           ============================================================ */
        .sidebar {
            background: var(--bg-card);
            min-height: 100vh;
            padding: 0;
            border-left: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px 16px 16px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            position: relative;
        }

        .sidebar-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 15%;
            right: 15%;
            height: 2px;
            background: var(--gradient-main);
            border-radius: 2px;
        }

        .sidebar-header .logo {
            font-size: 24px;
            font-weight: 900;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .sidebar-header .logo i {
            -webkit-text-fill-color: initial;
            color: var(--primary);
            margin-left: 6px;
        }

        .sidebar-header .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .sidebar .nav {
            padding: 12px 8px;
            flex: 1;
        }

        .sidebar .nav-link {
            color: var(--text-muted);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin: 2px 0;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 13px;
            border: 1px solid transparent;
            position: relative;
        }

        .sidebar .nav-link:hover {
            background: rgba(13, 110, 253, 0.1);
            color: var(--text-light);
            border-color: rgba(13, 110, 253, 0.2);
        }

        .sidebar .nav-link.active {
            background: var(--gradient-main);
            color: white;
            box-shadow: 0 4px 20px rgba(13, 110, 253, 0.3);
            border-color: transparent;
        }

        .sidebar .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 14px;
        }

        .sidebar .nav-link .badge-count {
            margin-right: auto;
            background: var(--gradient-red);
            color: white;
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(220, 53, 69, 0.3);
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 2px solid var(--border-color);
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            position: relative;
        }

        .sidebar-footer::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--gradient-main);
            border-radius: 2px;
        }

        /* ============================================================
           المحتوى الرئيسي
           ============================================================ */
        .main-content {
            padding: 20px 28px;
            min-height: 100vh;
            background: radial-gradient(ellipse at 0% 0%, #111128 0%, #0a0a1a 100%);
        }

        /* ============================================================
           الهيدر
           ============================================================ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title .title-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 20px rgba(13, 110, 253, 0.3);
        }

        .page-title .title-text {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title small {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-refresh {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-refresh:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 30px rgba(13, 110, 253, 0.15);
        }

        .btn-console {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-console:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 30px rgba(220, 53, 69, 0.3);
        }

        .btn-console .badge-error {
            background: var(--danger);
            color: white;
            border-radius: 50%;
            padding: 0 7px;
            font-size: 10px;
            margin-right: 4px;
            animation: pulse-badge 2s infinite;
        }

        /* ============================================================
           البطاقات الإحصائية - قابلة للنقر
           ============================================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 15px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px 20px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            opacity: 0;
            transition: var(--transition);
        }

        .stat-card.blue::before {
            background: var(--gradient-blue);
        }
        .stat-card.red::before {
            background: var(--gradient-red);
        }
        .stat-card.gradient::before {
            background: var(--gradient-main);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-blue);
            background: var(--bg-card-hover);
        }

        .stat-card.red:hover {
            border-color: var(--danger);
            box-shadow: var(--shadow-red);
        }

        .stat-card .stat-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card .stat-info {
            flex: 1;
        }

        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-card .stat-number {
            font-size: 26px;
            font-weight: 900;
            margin: 2px 0;
            letter-spacing: -0.5px;
        }

        .stat-card .stat-number.blue {
            color: var(--primary);
        }
        .stat-card .stat-number.red {
            color: var(--danger);
        }
        .stat-card .stat-number.gradient-text {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .stat-card .stat-icon.blue {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .stat-card .stat-icon.red {
            background: rgba(220, 53, 69, 0.15);
            color: var(--danger);
        }
        .stat-card .stat-icon.gradient {
            background: var(--gradient-main);
            color: white;
        }

        .stat-card .stat-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-card .stat-sub .highlight {
            color: var(--primary-light);
            font-weight: 600;
        }

        .stat-card .stat-sub .highlight-red {
            color: var(--danger-light);
            font-weight: 600;
        }

        /* ============================================================
           الجداول
           ============================================================ */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 0;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: var(--transition);
        }

        .table-container:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-blue);
        }

        .table-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
        }

        .table-header h6 {
            font-weight: 700;
            font-size: 15px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-header h6 .header-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
        }

        .table-tools {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .table-tools .search-box {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 6px 14px;
            color: var(--text-light);
            width: 200px;
            font-size: 12px;
            transition: var(--transition);
        }

        .table-tools .search-box:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .table-tools .search-box::placeholder {
            color: var(--text-muted);
        }

        .table-tools .count-badge {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary-light);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .table-responsive {
            padding: 0;
        }

        .table {
            margin: 0;
            font-size: 12px;
        }

        .table thead th {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 2px solid var(--border-color);
            color: var(--primary-light);
            font-weight: 700;
            padding: 10px 14px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table tbody td {
            padding: 10px 14px;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-light);
        }

        .table tbody tr:hover {
            background: rgba(13, 110, 253, 0.05);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ============================================================
           الأزرار
           ============================================================ */
        .btn-group-custom {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .btn-sm-custom {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            border: none;
            transition: var(--transition);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-weight: 600;
        }

        .btn-sm-custom:hover {
            transform: scale(1.05);
        }

        .btn-sm-custom.btn-view {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .btn-sm-custom.btn-view:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-sm-custom.btn-ban {
            background: rgba(220, 53, 69, 0.15);
            color: var(--danger);
        }
        .btn-sm-custom.btn-ban:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-sm-custom.btn-unban {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .btn-sm-custom.btn-unban:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-sm-custom.btn-edit {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        .btn-sm-custom.btn-edit:hover {
            background: #ffc107;
            color: #2d3436;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }

        .btn-sm-custom.btn-approve {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .btn-sm-custom.btn-approve:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-sm-custom.btn-reject {
            background: rgba(220, 53, 69, 0.15);
            color: var(--danger);
        }
        .btn-sm-custom.btn-reject:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-sm-custom.btn-toggle {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .btn-sm-custom.btn-toggle:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-sm-custom.btn-delete {
            background: rgba(220, 53, 69, 0.15);
            color: var(--danger);
        }
        .btn-sm-custom.btn-delete:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-sm-custom.btn-success {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .btn-sm-custom.btn-success:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        /* ============================================================
           الحالات
           ============================================================ */
        .badge-status {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-status.pending {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        .badge-status.completed {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .badge-status.rejected {
            background: rgba(220, 53, 69, 0.15);
            color: var(--danger);
        }
        .badge-status.refunded {
            background: rgba(220, 53, 69, 0.1);
            color: #e17055;
        }
        .badge-status.active {
            background: rgba(13, 110, 253, 0.15);
            color: var(--primary);
        }
        .badge-status.inactive {
            background: rgba(99, 110, 114, 0.15);
            color: #636e72;
        }

        /* ============================================================
           المودال
           ============================================================ */
        .modal-content {
            background: var(--bg-card);
            color: var(--text-light);
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            border-bottom: 2px solid var(--border-color);
            padding: 14px 20px;
            background: rgba(13, 110, 253, 0.05);
        }

        .modal-header .modal-title {
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-header .btn-close {
            filter: invert(1);
            opacity: 0.6;
        }

        .modal-header .btn-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            border-top: 2px solid var(--border-color);
            padding: 14px 20px;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-light);
        }

        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            font-size: 13px;
            transition: var(--transition);
        }

        .form-control:focus {
            background: var(--bg-input);
            border-color: var(--primary);
            color: var(--text-light);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        /* ============================================================
           الإشعارات
           ============================================================ */
        .alert {
            border-radius: var(--radius-sm);
            border: none;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-weight: 500;
            border-right: 4px solid transparent;
            font-size: 13px;
        }

        .alert-success {
            background: rgba(13, 110, 253, 0.1);
            color: var(--primary);
            border-right-color: var(--primary);
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
            border-right-color: var(--danger);
        }

        .alert-info {
            background: rgba(13, 110, 253, 0.1);
            color: var(--primary-light);
            border-right-color: var(--primary);
        }

        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            border-right-color: #ffc107;
        }

        .alert .btn-close {
            filter: invert(1);
            opacity: 0.5;
        }

        /* ============================================================
           زر إنشاء
           ============================================================ */
        .btn-create {
            background: var(--gradient-main);
            border: none;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(13, 110, 253, 0.3);
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(13, 110, 253, 0.4);
            color: white;
        }

        /* ============================================================
           التحميل
           ============================================================ */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            gap: 16px;
        }

        .loading-container .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-container p {
            color: var(--text-muted);
            font-size: 14px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           الحالة الفارغة
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state h5 {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
        }

        /* ============================================================
           تقرير المستخدم
           ============================================================ */
        .user-report {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .user-report .divider {
            border-color: var(--border-color);
            margin: 14px 0;
        }

        .user-report .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .user-report .info-row:last-child {
            border-bottom: none;
        }

        .user-report .info-label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 13px;
        }

        .user-report .info-value {
            font-weight: 600;
            font-size: 13px;
        }

        .user-report .info-value.blue {
            color: var(--primary);
        }
        .user-report .info-value.red {
            color: var(--danger);
        }

        /* ============================================================
           Console Logs
           ============================================================ */
        .console-logs {
            max-height: 350px;
            overflow-y: auto;
            background: #0a0a1a;
            border-radius: 8px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border: 1px solid var(--border-color);
        }

        .console-logs .log-entry {
            padding: 4px 6px;
            border-bottom: 1px solid #1a1a1a;
        }

        .console-logs .log-entry .time {
            color: #636e72;
            font-size: 10px;
        }

        .console-logs .log-entry .level-INFO {
            color: var(--primary);
            font-weight: bold;
        }
        .console-logs .log-entry .level-WARNING {
            color: #ffc107;
            font-weight: bold;
        }
        .console-logs .log-entry .level-ERROR {
            color: var(--danger);
            font-weight: bold;
        }
        .console-logs .log-entry .level-DEBUG {
            color: #20c997;
            font-weight: bold;
        }
        .console-logs .log-entry .message {
            color: var(--text-light);
        }
        .console-logs .log-entry .data {
            color: var(--text-muted);
            font-size: 10px;
            margin-top: 2px;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }

        .console-stats {
            background: var(--bg-card);
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            border: 1px solid var(--border-color);
        }

        .console-stats .stat {
            font-size: 12px;
        }

        .console-stats .stat .count {
            font-weight: 700;
        }

        .console-stats .stat .count.error {
            color: var(--danger);
        }
        .console-stats .stat .count.warning {
            color: #ffc107;
        }
        .console-stats .stat .count.info {
            color: var(--primary);
        }
        .console-stats .stat .count.debug {
            color: #20c997;
        }

        /* ============================================================
           تبويبات الإدارة
           ============================================================ */
        .admin-tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 4px;
            border: 1px solid var(--border-color);
        }

        .admin-tabs .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }

        .admin-tabs .tab-btn:hover {
            background: rgba(13, 110, 253, 0.1);
            color: var(--text-light);
        }

        .admin-tabs .tab-btn.active {
            background: var(--gradient-main);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ============================================================
           التجاوب مع الشاشات
           ============================================================ */
        @media (max-width: 992px) {
            .sidebar {
                min-height: auto;
                height: auto;
                position: relative;
                border-left: none;
                border-bottom: 2px solid var(--border-color);
            }

            .sidebar .nav {
                display: flex;
                flex-wrap: wrap;
                padding: 8px;
                gap: 3px;
            }

            .sidebar .nav-link {
                padding: 6px 10px;
                font-size: 12px;
                margin: 0;
                flex: 1 1 auto;
                min-width: 60px;
                justify-content: center;
            }

            .sidebar .nav-link i {
                margin-left: 0;
                margin-right: 0;
            }

            .sidebar .nav-link .nav-text {
                display: none;
            }

            .sidebar-header .logo {
                font-size: 20px;
            }

            .main-content {
                padding: 12px 14px;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
            }

            .stat-card .stat-number {
                font-size: 20px;
            }

            .page-title {
                font-size: 18px;
            }

            .table-tools .search-box {

            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .table-tools {
                flex-wrap: wrap;
            }

            .admin-tabs .tab-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        @media (max-width: 576px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-card {
                padding: 12px 14px;
            }

            .stat-card .stat-number {
                font-size: 17px;
            }

            .stat-card .stat-label {
                font-size: 10px;
            }

            .stat-card .stat-icon {
                width: 34px;

            }

                font-size: 16px;
            }

            .page-title small {
                display: none;
            }

            .main-content {

                padding: 6px 8px;

            }

            .table thead th {

            }

            .btn-sm-custom {
                padding: 3px 6px;
                font-size: 9px;
            }

            .table-tools .search-box {
                width: 100%;
            }

            .btn-create {
                padding: 6px 12px;
                font-size: 11px;
                width: 100%;
                justify-content: center;
            }

            .header-actions .btn-console {
                padding: 4px 10px;

        /* ============================================================
           Scrollbar مخصص
           ============================================================ */
        ::-webkit-scrollbar {

            height: 5px;
        }

        }

        .hover-glow:hover {
            box-shadow: 0 0 40px rgba(13, 110, 253, 0.15);
        }

        .pulse {

        }

        @keyframes pulse {
            0%,

            }

            }
        }

        .clickable {
            cursor: pointer;
        }

        .clickable:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    السكريبتات
    ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
    <script>
        // ============================================================
        // التكوين الأساسي
        // ============================================================

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpOZ35FAEtFn0GJ1_-qtlZm0rXi8a8b0nLhccC6a5U7G8QETXXqYSJHHjXZ5XHYRqg/exec';
        const ADMIN_ID = '7011476249';

        let currentPage = 'dashboard';
        let autoRefreshInterval = null;

        // ============================================================
        // دوال الاتصال بـ API
        // ============================================================

        async function apiCall(action, params = {}) {
            params.action = action;
            params.userId = ADMIN_ID;

            const url = new URL(SCRIPT_URL);
            Object.keys(params).forEach(key => {
                if (params[key] !== null && params[key] !== undefined) {
                    url.searchParams.append(key, params[key]);
                }
            });

            try {
                const response = await fetch(url.toString());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            } catch (error) {
                console.error('API Error:', error);
                showAlert('danger', '⚠️ ' + error.message);
                throw error;
            }
        }

        // ============================================================
        // دوال العرض الأساسية
        // ============================================================

        function showAlert(type, message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="إغلاق"></button>
            `;
            document.querySelector('.main-content').insertBefore(alertDiv, document.querySelector('.main-content').firstChild);
            setTimeout(() => { if (alertDiv.parentNode) alertDiv.remove(); }, 5000);
        }

        function showLoading() {
            document.getElementById('contentArea').innerHTML = `
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات...</p>
                </div>
            `;
        }

        function formatCurrency(amount) {
            if (!amount && amount !== 0) return '0';
            return Number(amount).toLocaleString('ar-EG');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const date = new Date(dateStr);
                return date.toLocaleString('ar-EG', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch { return dateStr; }
        }

        function getStatusBadge(status) {
            const map = {
                'pending': '<span class="badge-status pending">⏳ قيد المعالجة</span>',
                'completed': '<span class="badge-status completed">✅ مكتمل</span>',
                'rejected': '<span class="badge-status rejected">❌ مرفوض</span>',
                'refunded': '<span class="badge-status refunded">🔄 مسترجع</span>',
                'active': '<span class="badge-status active">✅ مفعل</span>',
                'inactive': '<span class="badge-status inactive">❌ معطل</span>'
            };
            return map[status] || `<span class="badge-status pending">${status}</span>`;
        }

        function truncate(str, len = 12) {
            if (!str) return '-';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }

        // ============================================================
        // تحميل الصفحات
        // ============================================================

        async function loadPage(page) {
            currentPage = page;

            document.querySelectorAll('.sidebar .nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar .nav-link[data-page="${page}"]`);
            if (activeLink) activeLink.classList.add('active');

            const titles = {
                'dashboard': { icon: 'fa-chart-pie', label: 'لوحة التحكم', sub: 'نظرة عامة' },
                'users': { icon: 'fa-users', label: 'المستخدمين', sub: 'إدارة المستخدمين' },
                'transactions': { icon: 'fa-exchange-alt', label: 'المعاملات', sub: 'سجل المعاملات' },
                'withdrawals': { icon: 'fa-hand-holding-usd', label: 'طلبات السحب', sub: 'إدارة طلبات السحب' },
                'payments': { icon: 'fa-credit-card', label: 'طلبات الدفع', sub: 'إدارة طلبات الدفع' },
                'gift_codes': { icon: 'fa-gift', label: 'أكواد الهدية', sub: 'إدارة الأكواد' },
                'referrals': { icon: 'fa-link', label: 'الإحالات', sub: 'نظام الإحالات' },
                'settings': { icon: 'fa-cog', label: 'الإعدادات', sub: 'إعدادات النظام' },
                'blocked': { icon: 'fa-ban', label: 'الأرقام المحظورة', sub: 'إدارة الحظر' },
                'report': { icon: 'fa-file-alt', label: 'التقارير', sub: 'تقارير شاملة' }
            };

            const info = titles[page] || titles.dashboard;
            document.getElementById('pageTitle').innerHTML = `
                <span class="title-icon"><i class="fas ${info.icon}"></i></span>
                <span class="title-text">${info.label}</span>
                <small>${info.sub}</small>
            `;

            if (page === 'dashboard') startAutoRefresh();
            else stopAutoRefresh();

            showLoading();

            try {
                switch (page) {
                    case 'dashboard':
                        await loadDashboard();
                        break;
                    case 'users':
                        await loadUsers();
                        break;
                    case 'transactions':
                        await loadTransactions();
                        break;
                    case 'withdrawals':
                        await loadWithdrawals();
                        break;
                    case 'payments':
                        await loadPaymentRequests();
                        break;
                    case 'gift_codes':
                        await loadGiftCodes();
                        break;
                    case 'referrals':
                        await loadReferrals();
                        break;
                    case 'settings':
                        await loadSettings();
                        break;
                    case 'blocked':
                        await loadBlocked();
                        break;
                    case 'report':
                        await loadReport();
                        break;
                }
            } catch (error) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i>
                        حدث خطأ: ${error.message}
                        <br>
                        <button class="btn btn-sm btn-outline-light mt-2" onclick="refreshCurrentPage()">
                            <i class="fas fa-redo"></i> إعادة المحاولة
                        </button>
                    </div>
                `;
            }
        }

        function refreshCurrentPage() { loadPage(currentPage); }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshInterval = setInterval(() => {
                if (currentPage === 'dashboard') loadDashboard();
            }, 30000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        function searchTable(query, tableId) {
            const table = document.getElementById(tableId);
            if (!table) return;
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        // ============================================================
        // 1. لوحة التحكم - مع بطاقات قابلة للنقر
        // ============================================================

        async function loadDashboard() {
            const data = await apiCall('dashboard');
            const stats = data.stats || {};

            document.getElementById('withdrawBadge').textContent = stats.pending_withdrawals || 0;
            document.getElementById('paymentBadge').textContent = stats.pending_payments || 0;

            const html = `
                <div class="stats-grid">
                    <div class="stat-card blue" onclick="loadPage('users')">
                        <div class="stat-content">
                            <div class="stat-info">
                                <div class="stat-label">👥 إجمالي المستخدمين</div>
                                <div class="stat-number blue">${stats.total_users || 0}</div>
                                <div class="stat-sub">🆕 جديد: <span class="highlight">${stats.new_users || 0}</span></div>
                            </div>
                            <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                        </div>
                    </div>

                    <div class="stat-card gradient" onclick="loadPage('users')">
                        <div class="stat-content">
                            <div class="stat-info">
                                <div class="stat-label">✅ المستخدمين النشطين</div>
                                <div class="stat-number gradient-text">${stats.active_users || 0}</div>
                                <div class="stat-sub">من إجمالي ${stats.total_users || 0}</div>
                            </div>
                            <div class="stat-icon gradient"><i class="fas fa-user-check"></i></div>
                        </div>
                    </div>

                    <div class="stat-card blue" onclick="loadPage('users')">
                        <div class="stat-content">
                            <div class="stat-info">
                                <div class="stat-label">🎮 حسابات IChancy</div>
                                <div class="stat-number blue">${stats.ichancy_users || 0}</div>
                                <div class="stat-sub">نسبة: <span class="highlight">${stats.total_users ? Math.round((stats.ichancy_users / stats.total_users) * 100) : 0}%</span></div>
                            </div>
                            <div class="stat-icon blue"><i class="fas fa-gamepad"></i></div>
                        </div>
                    </div>

                    <div class="stat-card red" onclick="loadPage('withdrawals')">
                        <div class="stat-content">
                            <div class="stat-info">
                                <div class="stat-label">⏳ طلبات سحب معلقة</div>
                                <div class="stat-number red">${stats.pending_withdrawals || 0}</div>
                                <div class="stat-sub">بحاجة للمراجعة</div>
                            </div>
                            <div class="stat-icon red"><i class="fas fa-clock"></i></div>
                        </div>
                    </div>

                    <div class="stat-card blue" onclick="loadPage('transactions')">
                        <div class="stat-content">

        // ============================================================
        // حظر/فك حظر المستخدم
        // ============================================================

        async function toggleUserBan(userId) {
            const action = await apiCall('user', { userId }).then(d => d.user?.is_banned == 1 ? 'فك حظر' : 'حظر');
            if (!confirm(`هل أنت متأكد من ${action} المستخدم؟`)) return;
            try {
                const data = await apiCall('toggle_ban', { userId });
                if (data.success) {
                    showAlert('success', `✅ تم ${data.is_banned == 1 ? 'حظر' : 'فك حظر'} المستخدم بنجاح`);
                    loadPage('users');
                }
            } catch (error) { showAlert('danger', error.message); }
        }

        // ============================================================
        // تعديل رصيد المستخدم
        // ============================================================

        async function editUserBalance(userId) {
            const amount = prompt('💰 أدخل المبلغ (استخدم + للإضافة أو - للخصم):\nمثال: 1000 أو -500');
            if (amount === null) return;
            const value = parseFloat(amount);
            if (isNaN(value)) { showAlert('danger', '⚠️ الرجاء إدخال رقم صحيح'); return; }
            try {
                const data = await apiCall('update_balance', { targetUser: userId, amount: value });
                if (data.success) {
                    showAlert('success', `✅ تم تحديث الرصيد: ${formatCurrency(data.new_balance)} SYP`);
                    loadPage('users');
                }
            } catch (error) { showAlert('danger', error.message); }
        }

        }

        async function clearLogs() {
            if (!confirm('هل أنت متأكد من مسح سجل الأخطاء؟')) return;
            try {
                await apiCall('clear_logs');
                showAlert('success', '✅ تم مسح السجل');
                document.getElementById('errorCount').textContent = '0';
                showErrorLogs();
            } catch (error) {
                showAlert('danger', '⚠️ فشل في مسح السجل: ' + error.message);
            }
        }

        async function updateErrorCount() {
            try {
                const data = await apiCall('get_logs');
                if (data.errorCount !== undefined) {
                    document.getElementById('errorCount').textContent = data.errorCount;
                }
            } catch (e) {}
        }

        // ============================================================
        // التهيئة
        // ============================================================

        document.addEventListener('DOMContentLoaded', function() {
            loadPage('dashboard');
            updateErrorCount();
            setInterval(updateErrorCount, 30000);
        });

        // جعل الدوال متاحة عالمياً
        window.loadPage = loadPage;
        window.refreshCurrentPage = refreshCurrentPage;
        window.viewUser = viewUser;
        window.toggleUserBan = toggleUserBan;
        window.editUserBalance = editUserBalance;
        window.approveWithdrawal = approveWithdrawal;
        window.rejectWithdrawal = rejectWithdrawal;
        window.approvePayment = approvePayment;
        window.rejectPayment = rejectPayment;
        window.showCreateGiftCode = showCreateGiftCode;
        window.toggleGiftCode = toggleGiftCode;
        window.deleteGiftCode = deleteGiftCode;
        window.editSetting = editSetting;
        window.togglePaymentMethod = togglePaymentMethod;
        window.toggleWithdrawMethod = toggleWithdrawMethod;
        window.unblockTxid = unblockTxid;
        window.searchTable = searchTable;
        window.showErrorLogs = showErrorLogs;
        window.clearLogs = clearLogs;
    </script>

</body>
</html>
